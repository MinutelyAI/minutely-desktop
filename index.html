<!doctype html>
<html class="dark">
  <head>
    <meta charset="UTF-8" />
    <title>Minutely.</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <script>
      (function(){var t=localStorage.getItem('minutely-theme')||'dark';if(t==='system'){t=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'}document.documentElement.className=t})();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/renderer.tsx"></script>
  </body>
</html>
